<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — 人员管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, Arial, sans-serif;
            background: linear-gradient(135deg, #eef3ff 0%, #f5f6fa 60%);
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            width: 100%; max-width: 380px;
            background: #fff; border-radius: 14px; padding: 32px 30px 28px;
            box-shadow: 0 10px 30px rgba(30, 64, 175, .08);
            border: 1px solid #e8eaed;
        }
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
        .brand-icon {
            width: 42px; height: 42px; border-radius: 11px;
            background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; box-shadow: 0 2px 8px rgba(37,99,235,.3);
        }
        .brand-name { font-size: 16px; font-weight: 700; color: #1a1d23; }
        .brand-sub { font-size: 12px; color: #9ba3af; }
        .form-label { font-size: 13px; color: #444b58; font-weight: 500; }
        .btn-primary {
            background: #2563eb; border-color: #2563eb; font-weight: 600;
        }
        .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
        .flash-wrap { margin-bottom: 14px; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand">
        <div class="brand-icon">👥</div>
        <div>
            <div class="brand-name">人员管理系统</div>
            <div class="brand-sub">请登录以继续</div>
        </div>
    </div>

    <div class="flash-wrap">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else category }} py-2 mb-2">{{ message }}</div>
            {% endfor %}
        {% endwith %}
    </div>

    <form method="post" action="{{ url_for('auth.login', next=request.args.get('next', '')) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label">账号</label>
            <input type="text" name="username" class="form-control" autocomplete="username" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label">密码</label>
            <input type="password" name="password" class="form-control" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">登 录</button>
    </form>
</div>
</body>
</html>
