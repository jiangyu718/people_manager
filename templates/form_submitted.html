<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交结果</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5" style="max-width: 480px;">
        <div class="text-center p-4 bg-white rounded-3 shadow-sm">
            {% if message and '失败' in message %}
            <div style="font-size:48px; margin-bottom:16px;">❌</div>
            <h4 class="mb-2" style="color:#991b1b;">{{ message }}</h4>
            {% elif message and ('已提交' in message or '已经' in message) %}
            <div style="font-size:48px; margin-bottom:16px;">✅</div>
            <h4 class="mb-2" style="color:#065f46;">{{ message }}</h4>
            {% else %}
            <div style="font-size:48px; margin-bottom:16px;">✅</div>
            <h4 class="mb-2" style="color:#065f46;">{{ message or '提交成功！' }}</h4>
            {% endif %}
            <p class="text-muted mb-0" style="font-size:14px;">此链接已失效，不可重复提交。</p>
        </div>
    </div>
</body>
</html>
